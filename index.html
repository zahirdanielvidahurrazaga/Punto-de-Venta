<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#0f172a" />
    <title>Plásticos POS - Sistema de Punto de Venta</title>
    <!-- Aplica el último tema conocido antes del primer render para evitar el
         parpadeo claro al entrar. App.jsx lo corrige por usuario al cargar. -->
    <script>try{if(localStorage.getItem('theme_last')==='dark')document.documentElement.classList.add('dark')}catch(e){}</script>
    <!-- Google Fonts - Plus Jakarta Sans -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;1,400&display=swap" rel="stylesheet">
  </head>
  <body class="bg-slate-50 antialiased selection:bg-teal-500 selection:text-white">
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js').then((registration) => {
            console.log('SW registrado con éxito:', registration.scope);
          }).catch((error) => {
            console.log('Fallo al registrar el SW:', error);
          });
        });
      }
    </script>
  </body>
</html>
